name: postsaver
description: "PostSaver mobile app for saving and managing posts."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Authentication (OAuth 2.0 / OIDC)
  flutter_appauth: ^12.0.2

  # Secure storage for tokens
  flutter_secure_storage: ^9.2.4

  # HTTP client
  dio: ^5.8.0+1

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.8.1

  # Share intent handling
  receive_sharing_intent: ^1.5.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
