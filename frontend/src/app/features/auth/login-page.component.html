<div class="auth-page">
  <div class="auth-card">
    <div class="brand">
      <i class="pi pi-bookmark-fill"></i>
      <span>PostSaver</span>
    </div>
    <p class="subtitle">Salve e organize seus posts favoritos das redes sociais.</p>
    <p-button label="Entrar" icon="pi pi-sign-in" (onClick)="login()" styleClass="w-full" />
    <p class="hint">
      Ainda não tem conta? <a routerLink="/register">Criar conta</a>
    </p>
  </div>
</div>
