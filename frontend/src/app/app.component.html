<p-toast position="top-right" />
<p-confirmdialog />

<div class="layout">
  <header class="topbar" *ngIf="isAuthenticated">
    <div class="brand">
      <i class="pi pi-bookmark-fill"></i>
      <span>PostSaver</span>
    </div>
    <nav class="nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <i class="pi pi-th-large"></i> Posts
      </a>
      <a routerLink="/folders" routerLinkActive="active">
        <i class="pi pi-folder"></i> Pastas
      </a>
      <a routerLink="/tags" routerLinkActive="active">
        <i class="pi pi-tags"></i> Tags
      </a>
    </nav>
    <p-button label="Sair" icon="pi pi-sign-out" [text]="true" (onClick)="logout()" />
  </header>

  <main class="content">
    <router-outlet />
  </main>
</div>
