# O Render injeta a porta em PORT e termina TLS no proxy; os headers
# X-Forwarded-* precisam ser honrados para os redirects OAuth saírem em https.
server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}?sslmode=${PGSSLMODE:require}
    username: ${PGUSER}
    password: ${PGPASSWORD}
  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: validate

app:
  oauth:
    issuer: ${APP_OAUTH_ISSUER}
    web-redirect-uri: ${APP_OAUTH_WEB_REDIRECT_URI}
    web-post-logout-redirect-uri: ${APP_OAUTH_WEB_POST_LOGOUT_REDIRECT_URI}
    mobile-redirect-uri: ${APP_OAUTH_MOBILE_REDIRECT_URI:br.com.cmarinho.postsaver://callback}
  security:
    jwk:
      keystore-location: ${APP_JWK_KEYSTORE_LOCATION}
      keystore-password: ${APP_JWK_KEYSTORE_PASSWORD}
      key-alias: ${APP_JWK_KEY_ALIAS}