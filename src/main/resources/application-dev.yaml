spring:
  datasource:
    url: jdbc:h2:mem:postsaver
    username: admin
    password:
  jpa:
    show-sql: true
    open-in-view: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false

app:
  oauth:
    issuer: http://localhost:8080
    web-redirect-uri: http://localhost:4200/callback
    web-post-logout-redirect-uri: http://localhost:4200/login
    mobile-redirect-uri: br.com.cmarinho.postsaver://callback